<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e68a00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007185;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005f6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 购物箱/包裹图标 -->
  <rect x="24" y="40" width="80" height="56" rx="4" ry="4" fill="url(#boxGradient)" />
  
  <!-- 箱子顶部线条 -->
  <path d="M 20 40 L 64 20 L 108 40" stroke="#cc7a00" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 箱子折叠线 -->
  <line x1="64" y1="20" x2="64" y2="40" stroke="#cc7a00" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Amazon 微笑箭头装饰 -->
  <path d="M 36 72 Q 64 88 92 72" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="88,68 94,72 88,76" fill="#ffffff" />
  
  <!-- 下载箭头 -->
  <g transform="translate(64, 110)">
    <polygon points="-8,-8 0,-20 8,-8 0,-4" fill="url(#arrowGradient)" />
    <line x1="0" y1="-4" x2="0" y2="16" stroke="url(#arrowGradient)" stroke-width="4" stroke-linecap="round" />
  </g>
  
  <!-- 导出箭头（右上角） -->
  <g transform="translate(100, 28)">
    <path d="M 0 0 L 16 0 L 16 -10" stroke="#007185" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="16,-16 8,-10 16,-4" fill="#007185" />
  </g>
</svg>

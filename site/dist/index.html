<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">好物推荐</title>
  <meta name="description" id="page-desc" content="精选 Amazon 好物推荐">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafafa;
      --bg-card: #ffffff;
      --bg-dark: #09090b;
      --text: #09090b;
      --text-secondary: #52525b;
      --text-muted: #a1a1aa;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-light: rgba(59,130,246,0.06);
      --border: #e4e4e7;
      --border-light: #f4f4f5;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }

    /* ── Nav ── */
    .nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(250,250,250,0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center;
      height: 60px;
    }
    .nav-brand {
      font-size: 17px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 8px;
      letter-spacing: -0.02em;
    }
    .nav-brand svg { width: 22px; height: 22px; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a {
      font-size: 14px; font-weight: 500; color: var(--text-secondary);
      transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--text); }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 72px 24px 48px;
      max-width: 640px;
      margin: 0 auto;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 13px; font-weight: 600;
      padding: 4px 14px;
      border-radius: 100px;
      margin-bottom: 20px;
      border: 1px solid rgba(59,130,246,0.12);
    }
    .hero h1 {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #09090b 0%, #52525b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 17px;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    /* ── Collections Grid ── */
    .section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 64px;
    }
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px;
    }
    .section-header h2 {
      font-size: 20px; font-weight: 700; letter-spacing: -0.02em;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(59,130,246,0.2);
    }
    .card-cover {
      width: 100%; height: 200px; object-fit: cover;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .card-cover-fallback {
      color: #fff; font-size: 40px; font-weight: 700; opacity: 0.5;
      letter-spacing: -0.02em;
    }
    .card-body { padding: 20px; }
    .card-body h3 {
      font-size: 16px; font-weight: 600; margin-bottom: 8px;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .card-body p {
      font-size: 14px; color: var(--text-secondary);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .card-footer {
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-meta {
      font-size: 13px; color: var(--text-muted); font-weight: 500;
    }
    .card-btn {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 13px; font-weight: 600; color: var(--accent);
      transition: all 0.15s;
    }
    .card-btn:hover { color: var(--accent-hover); gap: 8px; }
    .card-btn svg { width: 14px; height: 14px; transition: transform 0.15s; }

    /* ── Collection Detail ── */
    .detail {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 14px; color: var(--text-muted); font-weight: 500;
      margin-bottom: 28px;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--accent); }
    .back-link svg { width: 16px; height: 16px; }
    .detail-hero {
      margin-bottom: 40px;
    }
    .detail-hero-cover {
      width: 100%; max-height: 320px; object-fit: cover;
      border-radius: var(--radius);
      margin-bottom: 24px;
    }
    .detail-hero h1 {
      font-size: 30px; font-weight: 700; letter-spacing: -0.03em;
      margin-bottom: 10px; line-height: 1.2;
    }
    .detail-hero p {
      font-size: 16px; color: var(--text-secondary); line-height: 1.7;
    }

    /* ── Product List ── */
    .products { display: grid; gap: 16px; }
    .product {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      gap: 20px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .product:hover {
      box-shadow: var(--shadow-md);
      border-color: rgba(59,130,246,0.15);
    }
    .product-img {
      width: 110px; height: 110px; border-radius: var(--radius-sm);
      object-fit: cover; flex-shrink: 0;
      background: var(--border-light);
    }
    .product-img-fallback {
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; color: var(--text-muted);
    }
    .product-info { flex: 1; min-width: 0; }
    .product-info h4 {
      font-size: 15px; font-weight: 600; margin-bottom: 4px;
      letter-spacing: -0.01em;
      line-height: 1.4;
    }
    .product-asin {
      font-size: 12px; color: var(--text-muted);
      font-family: 'SF Mono', 'Menlo', monospace;
      margin-bottom: 8px;
    }
    .product-price {
      font-size: 20px; font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .product-note { font-size: 13px; color: var(--text-secondary); }
    .btn-buy {
      align-self: center;
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent);
      color: #fff;
      padding: 10px 22px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.15s;
      border: none; cursor: pointer;
    }
    .btn-buy:hover {
      background: var(--accent-hover);
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59,130,246,0.3);
    }
    .btn-buy svg { width: 14px; height: 14px; }

    /* ── Empty / Loading ── */
    .empty {
      text-align: center; padding: 72px 24px; color: var(--text-muted);
    }
    .empty-icon {
      width: 56px; height: 56px; margin: 0 auto 16px;
      background: var(--border-light); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .empty-icon svg { width: 24px; height: 24px; color: var(--text-muted); }
    .empty p { font-size: 15px; font-weight: 500; }
    .empty .sub { font-size: 13px; margin-top: 4px; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 40px 24px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 13px;
    }
    .footer p + p { margin-top: 4px; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .hero h1 { font-size: 28px; }
      .hero { padding: 48px 24px 32px; }
      .grid { grid-template-columns: 1fr; }
      .product { flex-direction: column; }
      .product-img { width: 100%; height: 200px; }
      .detail-hero h1 { font-size: 24px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="#/" class="nav-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      好物推荐
    </a>
    <div class="nav-links">
      <a href="#/">首页</a>
    </div>
  </div>
</nav>

<div id="app"></div>

<footer class="footer">
  <p>&copy; 2026 CJ-ATPlist</p>
  <p>As an Amazon Associate, we earn from qualifying purchases.</p>
</footer>

<script>
const API = '/api/public';

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  return res.json();
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function router() {
  const hash = location.hash || '#/';
  if (hash === '#/' || hash === '#') {
    renderCollections();
  } else if (hash.startsWith('#/collection/')) {
    renderDetail(hash.replace('#/collection/', ''));
  } else {
    renderCollections();
  }
}

async function renderCollections() {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="hero">
      <div class="hero-badge">Curated Picks</div>
      <h1>精选好物推荐</h1>
      <p>为你精心挑选的 Amazon 商品推荐合集，每一件都值得拥有</p>
    </div>
    <div class="section">
      <div class="section-header"><h2>推荐合集</h2></div>
      <div class="grid" id="grid">
        <div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div><p>加载中...</p></div>
      </div>
    </div>
  `;

  try {
    const res = await api('GET', '/collections');
    const grid = document.getElementById('grid');

    if (!res.success || !res.collections || res.collections.length === 0) {
      grid.innerHTML = `
        <div class="empty" style="grid-column:1/-1">
          <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg></div>
          <p>暂无推荐合集</p>
          <p class="sub">请稍后再来</p>
        </div>`;
      return;
    }

    grid.innerHTML = res.collections.map(c => `
      <a href="#/collection/${c.slug}" class="card" style="text-decoration:none;color:inherit">
        ${c.coverImage
          ? `<img class="card-cover" src="${esc(c.coverImage)}" alt="${esc(c.title)}" />`
          : `<div class="card-cover"><span class="card-cover-fallback">${esc((c.title || 'G')[0])}</span></div>`}
        <div class="card-body">
          <h3>${esc(c.title)}</h3>
          <p>${esc(c.description || '')}</p>
          <div class="card-footer">
            <span class="card-meta">${c.products || 0} 件商品</span>
            <span class="card-btn">
              查看详情
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
            </span>
          </div>
        </div>
      </a>
    `).join('');
  } catch {
    document.getElementById('grid').innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg></div>
        <p>加载失败</p>
        <p class="sub">请稍后重试</p>
      </div>`;
  }
}

async function renderDetail(slug) {
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="detail">
      <a href="#/" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        返回首页
      </a>
      <div id="detail">
        <div class="empty">
          <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
          <p>加载中...</p>
        </div>
      </div>
    </div>
  `;

  try {
    const res = await api('GET', '/collections/' + encodeURIComponent(slug));
    const detail = document.getElementById('detail');

    if (!res.success || !res.collection) {
      detail.innerHTML = `
        <div class="empty">
          <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></div>
          <p>合集不存在或已下架</p>
          <p class="sub"><a href="#/">返回首页</a></p>
        </div>`;
      return;
    }

    const c = res.collection;
    if (c.seoTitle) document.getElementById('page-title').textContent = c.seoTitle;
    if (c.seoDescription) document.getElementById('page-desc').setAttribute('content', c.seoDescription);

    let html = `<div class="detail-hero">`;
    if (c.coverImage) {
      html += `<img class="detail-hero-cover" src="${esc(c.coverImage)}" alt="${esc(c.title)}" />`;
    }
    html += `<h1>${esc(c.title)}</h1>`;
    if (c.description) html += `<p>${esc(c.description)}</p>`;
    html += `</div>`;

    if (res.products && res.products.length > 0) {
      html += '<div class="products">';
      res.products.forEach(p => {
        const img = (p.images && p.images.length > 0) ? p.images[0] : '';
        html += `
          <div class="product">
            ${img
              ? `<img class="product-img" src="${esc(img)}" alt="${esc(p.title)}" />`
              : `<div class="product-img product-img-fallback">
                  <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                </div>`}
            <div class="product-info">
              <h4>${esc(p.title)}</h4>
              <div class="product-asin">ASIN: ${esc(p.asin)}</div>
              ${p.price ? `<div class="product-price">${esc(p.price)}</div>` : ''}
              ${p.note ? `<div class="product-note">${esc(p.note)}</div>` : ''}
            </div>
            <a href="${esc(p.url || '#')}" target="_blank" rel="nofollow noopener" class="btn-buy"
               onclick="trackClick('${p.id}','${c.id}','${esc(p.url || '')}')">
              Amazon
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </a>
          </div>`;
      });
      html += '</div>';
    } else {
      html += `
        <div class="empty">
          <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg></div>
          <p>暂无商品</p>
        </div>`;
    }

    detail.innerHTML = html;
  } catch {
    document.getElementById('detail').innerHTML = `
      <div class="empty">
        <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg></div>
        <p>加载失败</p>
      </div>`;
  }
}

function trackClick(productId, collectionId, url) {
  api('POST', '/click', { productId, collectionId, affiliateUrl: url, referrer: document.referrer });
}

window.addEventListener('hashchange', router);
window.addEventListener('load', router);
</script>
</body>
</html>
